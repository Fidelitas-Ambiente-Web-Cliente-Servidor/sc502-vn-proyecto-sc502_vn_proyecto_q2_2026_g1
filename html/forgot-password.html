<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — EduLecto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="auth-screen">
    <aside class="auth-panel">
      <div class="auth-panel__owl">
        <img src="../img/buho.png" alt="Búho mascota de EduLecto leyendo un libro" />
      </div>
      <p class="auth-panel__tagline">Recupera tu contraseña</p>
    </aside>

    <section class="auth-form-wrap">
      <div class="auth-form-inner">
        <h1>Recuperar acceso a tu cuenta</h1>
        <p class="subtitle">Ingresá tu correo electrónico para recibir un enlace de restablecimiento.</p>

        <form id="forgot-form" novalidate>
          <div class="field" id="field-email">
            <label for="email">Correo electrónico</label>
            <div class="input-wrap">
              <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" autocomplete="email" required />
              <span class="toggle-visibility" style="pointer-events:none;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 6l10 7 10-7"/></svg>
              </span>
            </div>
            <p class="field-error" role="alert"></p>
          </div>

          <button type="submit" class="btn">Enviar enlace de recuperación</button>
        </form>

        <a class="back-link" href="login.html">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Volver al inicio de sesión
        </a>

        <div class="info-box">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <div>
            <strong>Proceso seguro</strong>
            El enlace de recuperación expirará en 24 horas por tu seguridad.
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
